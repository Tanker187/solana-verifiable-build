name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Solana version to generate Dockerfile for (e.g., 1.16.0)'
        required: true
        type: string

jobs:
  push_to_registries:
    name: Push Docker image to ghcr.io
    runs-on: ubuntu-latest
    environment: release-automation
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - uses: dopplerhq/secrets-fetch-action@v2.0.0
        id: doppler
        with:
          auth-method: oidc
          doppler-identity-id: ${{ vars.DOPPLER_SERVICE_IDENTITY_ID }}
          doppler-project: ${{ vars.DOPPLER_PROJECT || 'verifiable-build' }}
          doppler-config: ${{ vars.DOPPLER_CONFIG_CI || 'stg_github' }}
          inject-env-vars: true

      - name: Log in to the Container registry
        uses: docker/login-action@745e12c13fda321388fe2b88ba593ff3f70c2517
        with:
          registry: docker.io
          username: ${{ steps.doppler.outputs.DOCKER_USERNAME }}
          password: ${{ steps.doppler.outputs.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@1b2e78b2f16968c43ad83fa0537a1bd30d0c1447
        with:
          images: |
            docker.io/solanafoundation/solana-verifiable-build

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: docker/
          file: docker/v${{ github.event.inputs.version }}.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            docker.io/solanafoundation/solana-verifiable-build:${{ github.event.inputs.version }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: index.docker.io/solanafoundation/solana-verifiable-build
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
